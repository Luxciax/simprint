name: Build Windows No-Login Simprint

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2025
    env:
      ENV_NAME: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare app config
        shell: powershell
        run: |
          Copy-Item "src-tauri/config.example.toml" "src-tauri/config.production.toml" -Force

      - name: Use fixed Tauri config
        shell: powershell
        run: |
          Copy-Item "src-tauri/tauri.conf.fixed.json" "src-tauri/tauri.conf.json" -Force

      - name: Prepare version
        run: node deploy/prepare-version.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: .
          args: --features production

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: simprint-no-login-windows-bundles
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/*.exe
          if-no-files-found: error
